name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    name: Validate skills & engine
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate every SKILL.md frontmatter
        run: python3 engine/validate_skills.py

      - name: Dry-run the distributor (must not error)
        run: python3 engine/distribute.py --src ./skills --dest . --dry-run

      - name: Smoke-test chatsync imports & CLI help
        run: |
          python3 -c "import engine.chatsync.canonical, engine.chatsync.exporter, engine.chatsync.html_viewer"
          python3 engine/sync_chats.py --help
          python3 engine/handoff_chat.py --help

  build-app:
    name: Build Myco menu-bar app
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift toolchain
        run: swift --version

      - name: Build (release)
        working-directory: app
        run: swift build -c release

